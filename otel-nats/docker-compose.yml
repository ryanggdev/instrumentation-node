services:

  # ── NATS Server ─────────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    # --http_port enables the monitoring endpoint (healthcheck + /varz metrics)
    command: ["--http_port", "8222", "--jetstream"]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # monitoring / HTTP healthcheck
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Jaeger (all-in-one) ──────────────────────────────────────────────────────
  # Accepts OTLP/HTTP on port 4318, serves the UI on port 16686.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI  →  http://localhost:16686
      - "4318:4318"    # OTLP HTTP  (used by the app)
